<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p >两种方式访问对象</p>
    <p id="demo"></p>
    <button onclick="myFunction()">点击</button>
    <script>
        var persond={
            name:"甄辉",
            age:36,
            sex:"男",
            fullname: function(){
                return this.name+"现在是"+this.age+"岁了";
                
            }
        };
        function myFunction() {
           alert(persond.fullname());
        }
    </script>
</body>
</html>

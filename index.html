<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 鼠标悬停示例</title>
</head>
<body>
    <p>把鼠标移动到下面这段文字上：</p>
    <p id="demo" onmouseenter="highlightText()" onmouseleave="resetText()">鼠标移到这里时，文字会变颜色</p>

    <script src="index.js"></script>
</body>
</html>

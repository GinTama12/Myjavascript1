<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>while循环语句</h1>
    <p id="demo"></p>
    <button onclick="myfunction()">点击我</button>
    <script>
        function myfunction() {

            var i = 0;

            while (i < 10) {

                document.getElementById("demo").innerHTML += i + " ";

                i++;

            }

        }
    </script>
    <h2>do while循环语句</h2>
    <p id="demo1"></p>
    <button onclick="myfunction1()">点击我</button>
    <script>
        function myfunction1() {
            var i = 0;
            do {
                document.getElementById("demo1").innerHTML += i + " ";
                i++;
            } while (i < 10);
        }
    </script>
</body>
</html>

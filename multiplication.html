<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九九乘法表</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #f093fb;
            --accent: #f5576c;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }
        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 50%);
            pointer-events: none;
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            animation: float 15s infinite ease-in-out;
        }
        .shape:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 10%; animation-delay: 0s; }
        .shape:nth-child(2) { width: 60px; height: 60px; top: 20%; right: 15%; animation-delay: 2s; }
        .shape:nth-child(3) { width: 100px; height: 100px; bottom: 20%; left: 20%; animation-delay: 4s; }
        .shape:nth-child(4) { width: 40px; height: 40px; bottom: 30%; right: 25%; animation-delay: 6s; }
        .shape:nth-child(5) { width: 70px; height: 70px; top: 50%; left: 50%; animation-delay: 8s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(90deg); }
            50% { transform: translateY(0) rotate(180deg); }
            75% { transform: translateY(20px) rotate(270deg); }
        }
        .header {
            background: var(--card-bg);
            padding: 20px 50px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
            margin-bottom: 40px;
            color: #333;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 3px;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.2);
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(102, 126, 234, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(150, 100, 255, 0.8)); }
        }
        .table-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.25);
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .cell {
            background: var(--card-bg);
            color: #4a5568;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.6);
            min-width: 90px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.2), transparent);
            transition: left 0.5s ease;
        }
        .cell:hover::before {
            left: 100%;
        }
        .cell:hover {
            transform: translateY(-8px) scale(1.1);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #667eea, #f093fb);
            color: #fff;
            border-color: rgba(255,255,255,0.3);
        }
        .cell:active {
            transform: translateY(-4px) scale(1.05);
        }
        @media (max-width: 768px) {
            .cell {
                min-width: 60px;
                padding: 10px 12px;
                font-size: 14px;
            }
            .row {
                gap: 8px;
            }
            .table-container {
                padding: 20px;
                gap: 10px;
            }
            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="header">
        <h1>✨ 甄辉编写的九九乘法表 ✨</h1>
    </div>
    <div class="table-container" id="multiplication-table"></div>

    <script>
        function generateTable() {
            const container = document.getElementById("multiplication-table");
            let htmlContent = "";

            for (let i = 1; i <= 9; i++) {
                htmlContent += `<div class="row">`;
                for (let j = 1; j <= i; j++) {
                    htmlContent += `<div class="cell">${j} &times; ${i} = ${i * j}</div>`;
                }
                htmlContent += `</div>`;
            }

            container.innerHTML = htmlContent;
        }
        generateTable();
    </script>
</body>
</html>
